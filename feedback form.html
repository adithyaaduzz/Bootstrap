<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
      <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-4">

        <div class="card shadow">
            <div class="card-body">
                <h3 class="cad-title">Feedback Form</h3>

     <div class="form-group">
      <label for="name">Name:</label>
      <input type="type" class="form-control" id="name" placeholder="Enter Name" name="name">
    </div>
    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" class="form-control" id="email" placeholder="Enter email" name="email">
    </div>
    <div class="form-group">
      <label for="comment">Feedback:</label>
     <textarea class="form-control" rows="3" id="comment" placeholder="Enter your feedback"></textarea>
    </div>

    <div class="form-group">
  <label for="source">How did you find our site?</label>
  <select class="form-control" id="source">
    <option value="">select an option:</option>
    <option>Google</option>
    <option>Friend</option>
    <option>Social media</option>
    <option>Others</option>
  </select>
</div>

    <h4>Your Satisfaction level:</h4>
    <div class="form-check">
  <label class="form-check-label">
    <input type="radio" class="form-check-input "name="optradio">1
  </label>
</div>
<div class="form-check">
  <label class="form-check-label">
    <input type="radio" class="form-check-input"name="optradio">2
  </label>
</div>
<div class="form-check">
  <label class="form-check-label">
    <input type="radio" class="form-check-input" name="optradio">3
  </label>
</div>
 <div class="form-check">
  <label class="form-check-label">
    <input type="radio" class="form-check-input "name="optradio">4
  </label>
</div>
 <div class="form-check">
  <label class="form-check-label">
    <input type="radio" class="form-check-input "name="optradio">5
  </label>
</div>

    <button type="submit" class="btn btn-primary">Submit</button>
    </div></div></div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>

</body>
</html>
