<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Progress Dashboard</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
      <div class="container">

    <ol class = "breadcrumb">
   <li class = "breadcrumb-item"><a href = "https://www.mashupstack.com">Home</a></li>
   <li class = "breadcrumb-item"><a href="https://www.mashupstack.com/list-courses">Courses</a></li>
    <li class="breadcrumb-item active" aria-current="page">Web Development</li>
</ol>

<h4 class="mp-4">Web Development Course  <span class="badge bg-danger">NEW</span></h4>

<h4>Course Modules:</h4>

<p>HTML</p>
<div class="progress mb-3">
    <div class="progress-bar bg-success progress-bar-striped" style="width:100%">
        HTML -100%
    </div>
</div>
<p>CSS</p>
<div class="progress mb-3">
    <div class="progress-bar bg-primary progress-bar-striped progress-bar-animated" style="width:75%">
        CSS -75%
    </div>
</div>
<p>Javascript</p>
<div class="progress mb-3">
    <div class="progress-bar bg-warning" style="width:50%">
        Javascript -50%
    </div>
</div>
<p>Bootstrap</p>
<div class="progress mb-3">
    <div class="progress-bar bg-danger" style="width:25%">
       Bootstrap -25%
    </div>
</div>

<div class="btn-group mb-4">
        <button class="btn btn-success">Start</button>
        <button class="btn btn-warning">Pause</button>
        <button class="btn btn-danger">Reset</button>
    </div>

    <ul class="pagination">
        <li class="page-item active">
            <a class="page-link" href="#">1</a>
        </li>
        <li class="page-item">
            <a class="page-link" href="#">2</a>
        </li>
        <li class="page-item disabled">
            <a class="page-link" href="#">3</a>
        </li>
    </ul>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
