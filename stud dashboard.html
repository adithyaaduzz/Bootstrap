<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUD DASHBOARD</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
    <ol class = "breadcrumb">
   <li class = "breadcrumb-item"><a href = "https://www.mashupstack.com">Home</a></li>
   <li class = "breadcrumb-item"><a href="https://www.mashupstack.com/list-courses">dashboard</a></li>
    <li class="breadcrumb-item active" aria-current="page">My Courses</li>
</ol>
     <button class="btn btn-outline-primary btn-md mb-4">
        Start New Course
    </button>
     <h3>
        My Progress
        <span class="badge bg-secondary">3 Courses</span>
    </h3>
    
<div class="progress mb-4">
  <div class="progress-bar bg-success progress-bar-striped progress-bar-animated" style="width:70%">70%</div></div>
  <ul class="pagination">
  <li class="page-item"><a class="page-link" href="#">1</a></li>
  <li class="page-item active"><a class="page-link" href="#">2</a></li>
  <li class="page-item"><a class="page-link" href="#">3</a></li>
</ul>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
